[package]
name = "sillad"
edition = "2024"
description = "A framework for talking about TCP-like dialers and listeners, within the futures-io ecosystem"
version = "0.2.9"
repository.workspace = true
license.workspace = true

[dependencies]
anyhow = "1.0.102"
async-io = "2.6.0"
async-trait = "0.1.89"
futures-concurrency = "7.7.1"
futures-lite = "2.6.1"
futures-util = { version = "0.3.32", features = ["io"] }
libc = "0.2.186"
pin-project = "1.1.11"
rand = "0.8.6"
smol-timeout2 = "0.6.1"
socket2 = "0.5.10"
tracing = "0.1.44"
