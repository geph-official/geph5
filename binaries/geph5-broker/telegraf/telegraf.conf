# Telegraf config for the geph5 broker host (matrix.liekkas.city).
# Deployed at /etc/telegraf/telegraf.conf.
#
# Pipeline: geph5 binaries emit tagged (DogStatsD-format) statsd over localhost
# UDP; Telegraf aggregates each 10s window (counters summed, gauges last-value,
# timers -> count/mean/percentiles) and batch-writes one table per measurement
# into the Aiven Postgres that also holds all other broker data.
#
# Tags travel inside each statsd packet, so adding a new metric or tag requires
# NO changes here - this file is static by design. Hourly rollups and retention
# are pg_cron jobs (see ../sql/metrics.sql), not Telegraf concerns.

[global_tags]

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  # Buffers metrics in RAM across Postgres outages/failovers.
  metric_buffer_limit = 100000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "0s"
  # Everything funnels through this single Telegraf; a host tag/column is noise.
  omit_hostname = true

[[inputs.statsd]]
  service_address = "127.0.0.1:8125"
  delete_counters = true
  # metric_type (counter/gauge/timing) is kept: the pg_cron rollup reads it to
  # pick aggregation semantics. "geph5" is an artifact of the legacy template
  # below and is dropped.
  tagexclude = ["geph5"]
  # Parse DogStatsD-style "|#tag:value" extensions (the geph5-stats library format).
  datadog_extensions = true
  percentiles = [90.0, 99.0]
  # LEGACY, remove after the whole fleet uses report_stats: old exits still
  # reach us as classic dot-path gauges relayed by the broker's deprecated
  # set_stat RPC.
  templates = [
    "geph5.*.kbps geph5.exit.measurement",
    "geph5.*.load geph5.exit.measurement",
    "geph5.*.uptime geph5.exit.measurement",
    "geph5.*.task_count geph5.exit.measurement",
    "geph5.*.schedlag geph5.exit.measurement",
  ]

# Credentials live only in the deployed copy on the broker host; fill the
# placeholders when deploying (or export them via the telegraf systemd unit
# and use ${ENV_VAR} interpolation).
[[outputs.postgresql]]
  connection = "postgres://USER:PASSWORD@HOST:PORT/DBNAME?sslmode=require"
  # Landing in this schema is what makes a table a metric: rollups, retention
  # and metric() discover tables here by introspection (see sql/metrics.sql).
  schema = "metrics"
  timestamp_column_type = "timestamp with time zone"

# LEGACY, remove when InfluxDB is decommissioned: keeps the old dashboards
# fed during the transition.
[[outputs.influxdb]]
  urls = ["http://127.0.0.1:8086"]
  database = "mydb"
  username = "ingest"
  password = "PASSWORD"
