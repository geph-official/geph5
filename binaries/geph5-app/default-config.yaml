# Base template for the child geph5-client config. The supervising `geph manager`
# deserializes this into a geph5_client::Config and then overrides the dynamic
# fields (credentials, exit_constraint, dry_run, listen ports, cache) before
# spawning the child process.
#
# Copied from gephgui-wry's default-config.yaml, with the fields that no longer
# exist on geph5_client::Config removed (vpn, vpn_fd, tunmgr_socket, kill_switch).
